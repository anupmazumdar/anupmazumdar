name: my-badges

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        # ✅ Removed persist-credentials: false — it was blocking the push

      - name: Update My Badges
        run: npx update-my-badges anupmazumdar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
