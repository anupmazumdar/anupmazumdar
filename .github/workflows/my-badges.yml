name: my-badges

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Update My Badges
        run: npx update-my-badges anupmazumdar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix broken evening-commits image URL
        run: |
          sed -i 's|https://my-badges.github.io/my-badges/evening-commits.png|https://raw.githubusercontent.com/anupmazumdar/anupmazumdar/main/badges/time-of-commit/evening-commits.png|g' README.md
          echo "Fixed evening-commits URL"
          grep "evening-commits" README.md

      - name: Commit fixed README
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "fix: patch evening-commits badge URL"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
